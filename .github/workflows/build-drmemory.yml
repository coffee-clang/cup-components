name: Build Dr. Memory

on:
  workflow_dispatch:
    inputs:
      version:
        description: Dr. Memory version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSYS2 CLANG64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true

      - name: Install test dependencies (Windows CLANG64)
        run: scripts/setup/setup-windows-msys2.sh clang64

      - name: Build package
        run: |
          export CUP_BUILD_ENVIRONMENT=msys2-clang64
          bash scripts/build/build-drmemory.sh \
            "${{ inputs.version }}" \
            windows-x64 \
            windows-x64 \
            "${{ inputs.revision }}"

      - name: Test packaged Dr. Memory
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\clang64\bin;C:\msys64\usr\bin;$env:Path"
          scripts/test/test-drmemory-windows.ps1

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated cup component build for $tag"
          fi
