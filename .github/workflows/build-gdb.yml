name: Build GDB

on:
  workflow_dispatch:
    inputs:
      version:
        description: GDB version, or stable/latest
        required: true
        default: stable
      host_platform:
        description: Host platform
        required: true
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - windows-x64
        default: linux-x64
      target_platform:
        description: Target platform
        required: true
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - windows-x64
        default: linux-x64
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      runner: ${{ steps.platform.outputs.runner }}
      host_platform: ${{ steps.platform.outputs.host_platform }}
      target_platform: ${{ steps.platform.outputs.target_platform }}
    steps:
      - id: platform
        shell: bash
        run: |
          host_platform="${{ inputs.host_platform }}"
          target_platform="${{ inputs.target_platform }}"

          case "$host_platform" in
            linux-x64) runner="ubuntu-24.04" ;;
            linux-arm64) runner="ubuntu-24.04-arm" ;;
            windows-x64) runner="windows-2025" ;;
            *)
              echo "Unsupported GDB host platform: $host_platform" >&2
              exit 1
              ;;
          esac

          case "$host_platform:$target_platform" in
            linux-x64:linux-x64|linux-arm64:linux-arm64|windows-x64:windows-x64) ;;
            *)
              echo "Unsupported GDB build combination: $host_platform -> $target_platform" >&2
              exit 1
              ;;
          esac

          echo "runner=$runner" >> "$GITHUB_OUTPUT"
          echo "host_platform=$host_platform" >> "$GITHUB_OUTPUT"
          echo "target_platform=$target_platform" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ${{ needs.select.outputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        if: ${{ startsWith(needs.select.outputs.host_platform, 'linux-') }}
        run: docker build -f docker/toolchain-builder.Dockerfile -t cup-toolchain-builder .

      - name: Build package (Linux)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'linux-') }}
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-toolchain \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-toolchain-builder \
            bash scripts/build/build-gdb.sh \
              "${{ inputs.version }}" \
              "${{ needs.select.outputs.host_platform }}" \
              "${{ needs.select.outputs.target_platform }}" \
              "${{ inputs.revision }}"

      - name: Test packaged GDB (Linux)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'linux-') }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-toolchain-builder \
            bash scripts/test/test-gdb.sh

      - name: Set up MSYS2 UCRT64
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

      - name: Install build dependencies (Windows UCRT64)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        shell: msys2 {0}
        run: bash scripts/setup/setup-windows-msys2.sh ucrt64

      - name: Build package (Windows)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        shell: msys2 {0}
        run: |
          export CUP_BUILD_ENVIRONMENT=msys2-ucrt64
          bash scripts/build/build-gdb.sh \
            "${{ inputs.version }}" \
            "${{ needs.select.outputs.host_platform }}" \
            "${{ needs.select.outputs.target_platform }}" \
            "${{ inputs.revision }}"

      - name: Test packaged GDB (Windows)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        shell: pwsh
        run: scripts/test/test-gdb-windows.ps1

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: |
            dist/*.tar.xz
            dist/*.tar.gz
            dist/*.zip
            dist/release.env
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated cup component build for $tag"
          fi
