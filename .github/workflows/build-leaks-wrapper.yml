name: Build Leaks

on:
  workflow_dispatch:
    inputs:
      host_platform:
        description: macOS host platform
        required: true
        type: choice
        options:
          - macos-x64
          - macos-arm64
        default: macos-arm64
      version:
        description: Wrapper version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      runner: ${{ steps.platform.outputs.runner }}
      platform: ${{ steps.platform.outputs.platform }}
    steps:
      - id: platform
        shell: bash
        run: |
          case "${{ inputs.host_platform }}" in
            macos-x64) runner="macos-15-intel" ;;
            macos-arm64) runner="macos-15" ;;
            *)
              echo "Unsupported macOS host platform: ${{ inputs.host_platform }}" >&2
              exit 1
              ;;
          esac

          echo "runner=$runner" >> "$GITHUB_OUTPUT"
          echo "platform=${{ inputs.host_platform }}" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ${{ needs.select.outputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies (macOS)
        shell: bash
        run: scripts/setup/setup-macos-builder.sh

      - name: Build package
        shell: bash
        run: |
          brew_bash="$(brew --prefix bash)/bin/bash"
          export CUP_BUILD_ENVIRONMENT=github-macos
          "$brew_bash" scripts/build/build-leaks-wrapper.sh \
            "${{ inputs.version }}" \
            "${{ needs.select.outputs.platform }}" \
            "${{ needs.select.outputs.platform }}" \
            "${{ inputs.revision }}"

      - name: Test packaged leaks wrapper
        shell: bash
        run: |
          brew_bash="$(brew --prefix bash)/bin/bash"
          "$brew_bash" scripts/test/test-leaks-macos.sh

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated cup component build for $tag"
          fi
