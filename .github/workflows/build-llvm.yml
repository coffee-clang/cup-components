name: Build LLVM tool

on:
  workflow_dispatch:
    inputs:
      tool:
        description: LLVM tool to build
        required: true
        type: choice
        options:
          - clang
          - lld
          - lldb
          - clangd
          - clang-format
          - clang-tidy
      version:
        description: Tool version, or stable/latest
        required: true
        default: stable
      host_platform:
        description: Host platform
        required: true
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - windows-x64
          - macos-x64
          - macos-arm64
        default: linux-x64
      target_platform:
        description: Target platform
        required: true
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - windows-x64
          - macos-x64
          - macos-arm64
        default: linux-x64
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      runner: ${{ steps.platform.outputs.runner }}
      host_platform: ${{ steps.platform.outputs.host_platform }}
      target_platform: ${{ steps.platform.outputs.target_platform }}
    steps:
      - id: platform
        shell: bash
        run: |
          host_platform="${{ inputs.host_platform }}"
          target_platform="${{ inputs.target_platform }}"

          case "$host_platform" in
            linux-x64) runner="ubuntu-24.04" ;;
            linux-arm64) runner="ubuntu-24.04-arm" ;;
            windows-x64) runner="windows-2025" ;;
            macos-x64) runner="macos-15-intel" ;;
            macos-arm64) runner="macos-15" ;;
            *)
              echo "Unsupported host platform: $host_platform" >&2
              exit 1
              ;;
          esac

          if [ "$host_platform" != "$target_platform" ]; then
            echo "LLVM tool builds currently support native host==target builds only: $host_platform -> $target_platform" >&2
            exit 1
          fi

          if [ "$host_platform" = "windows-arm64" ]; then
            echo "Windows ARM64 is not enabled for LLVM packages yet" >&2
            exit 1
          fi

          echo "runner=$runner" >> "$GITHUB_OUTPUT"
          echo "host_platform=$host_platform" >> "$GITHUB_OUTPUT"
          echo "target_platform=$target_platform" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ${{ needs.select.outputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        if: ${{ startsWith(needs.select.outputs.host_platform, 'linux-') }}
        run: docker build -f docker/llvm-builder.Dockerfile -t cup-llvm-builder .

      - name: Build package (Linux)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'linux-') }}
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-llvm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-llvm-builder \
            bash scripts/build/build-llvm-tool.sh \
              "${{ inputs.tool }}" \
              "${{ inputs.version }}" \
              "${{ needs.select.outputs.host_platform }}" \
              "${{ needs.select.outputs.target_platform }}" \
              "${{ inputs.revision }}"

      - name: Test packaged LLVM tool (Linux)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'linux-') }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-llvm-builder \
            bash scripts/test/test-llvm-tool.sh "${{ inputs.tool }}"

      - name: Set up MSYS2 CLANG64
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true

      - name: Install build dependencies (Windows CLANG64)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        shell: msys2 {0}
        run: bash scripts/setup/setup-windows-msys2.sh clang64

      - name: Build package (Windows)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        shell: msys2 {0}
        run: |
          export CUP_BUILD_ENVIRONMENT=msys2-clang64
          bash scripts/build/build-llvm-tool.sh \
            "${{ inputs.tool }}" \
            "${{ inputs.version }}" \
            "${{ needs.select.outputs.host_platform }}" \
            "${{ needs.select.outputs.target_platform }}" \
            "${{ inputs.revision }}"

      - name: Test packaged LLVM tool (Windows)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'windows-') }}
        shell: pwsh
        run: scripts/test/test-llvm-tool-windows.ps1 -Tool "${{ inputs.tool }}"

      - name: Install build dependencies (macOS)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'macos-') }}
        shell: bash
        run: bash scripts/setup/setup-macos-builder.sh

      - name: Build package (macOS)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'macos-') }}
        shell: bash
        run: |
          brew_bash="$(brew --prefix bash)/bin/bash"
          export CUP_BUILD_ENVIRONMENT=github-macos
          "$brew_bash" scripts/build/build-llvm-tool.sh \
            "${{ inputs.tool }}" \
            "${{ inputs.version }}" \
            "${{ needs.select.outputs.host_platform }}" \
            "${{ needs.select.outputs.target_platform }}" \
            "${{ inputs.revision }}"

      - name: Test packaged LLVM tool (macOS)
        if: ${{ startsWith(needs.select.outputs.host_platform, 'macos-') }}
        shell: bash
        run: |
          brew_bash="$(brew --prefix bash)/bin/bash"
          "$brew_bash" scripts/test/test-llvm-tool.sh "${{ inputs.tool }}"

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: |
            dist/*.tar.xz
            dist/*.tar.gz
            dist/*.zip
            dist/release.env
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated cup component build for $tag"
          fi
