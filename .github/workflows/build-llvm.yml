name: Build LLVM tool (Linux)

on:
  workflow_dispatch:
    inputs:
      tool:
        description: LLVM tool to build
        required: true
        type: choice
        options:
          - clang
          - lld
          - lldb
          - clangd
          - clang-format
          - clang-tidy
      version:
        description: Tool version, or stable/latest
        required: true
        default: stable
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/llvm-builder.Dockerfile -t cup-llvm-builder .

      - name: Build package
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-llvm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-llvm-builder \
            bash scripts/build/build-llvm-tool.sh \
              "${{ inputs.tool }}" \
              "${{ inputs.version }}" \
              linux-x64 \
              linux-x64 \
              "${{ inputs.revision }}"

      - name: Test packaged LLVM tool
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-llvm-builder \
            bash scripts/test/test-llvm-tool.sh "${{ inputs.tool }}"

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated cup component build for $tag"
          fi
