name: Build Valgrind

on:
  workflow_dispatch:
    inputs:
      version:
        description: Valgrind version, or stable/latest
        required: true
        default: stable
      host_platform:
        description: Host platform
        required: true
        type: choice
        options:
          - linux-x64
          - linux-arm64
        default: linux-x64
      revision:
        description: Package revision metadata
        required: true
        default: '1'
      publish:
        description: Publish packages as GitHub Release assets
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-24.04
    outputs:
      runner: ${{ steps.platform.outputs.runner }}
    steps:
      - id: platform
        shell: bash
        run: |
          case "${{ inputs.host_platform }}" in
            linux-x64) runner="ubuntu-24.04" ;;
            linux-arm64) runner="ubuntu-24.04-arm" ;;
            *)
              echo "Unsupported Valgrind host platform: ${{ inputs.host_platform }}" >&2
              exit 1
              ;;
          esac

          echo "runner=$runner" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    runs-on: ${{ needs.select.outputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/toolchain-builder.Dockerfile -t cup-toolchain-builder .

      - name: Build package
        run: |
          docker run --rm \
            -e CUP_BUILD_ENVIRONMENT=docker-toolchain \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-toolchain-builder \
            bash scripts/build/build-valgrind.sh \
              "${{ inputs.version }}" \
              "${{ inputs.host_platform }}" \
              "${{ inputs.revision }}"

      - name: Test packaged Valgrind
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            cup-toolchain-builder \
            bash scripts/test/test-valgrind.sh

      - name: Load release metadata
        id: release
        shell: bash
        run: |
          source dist/release.env
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Verify package checksums before upload
        shell: bash
        run: |
          source dist/release.env
          source scripts/package/package-common.sh
          verify_package_checksums "$package_base" "$GITHUB_WORKSPACE/dist"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.tag }}
          path: |
            dist/*.tar.xz
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/release.env
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip dist/SHA256SUMS \
              --repo "$repo" \
              --clobber
          else
            gh release create "$tag" dist/*.tar.xz dist/*.tar.gz dist/*.zip dist/SHA256SUMS \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated cup component build for $tag"
          fi
